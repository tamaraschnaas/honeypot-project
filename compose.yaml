services:
  db:
    image: postgres:16
    container_name: honeypot-db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: ./api
    container_name: honeypot-api
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "${API_PORT}:8000"
    depends_on:
      - db

  dashboard:
    build: ./dashboard
    container_name: honeypot-dashboard
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "${DASHBOARD_PORT}:8501"
    depends_on:
      - db

  cowrie:
    image: cowrie/cowrie:latest
    container_name: honeypot-cowrie
    ports:
      - "2222:2222"
    environment:
      COWRIE_TELNET_ENABLED: "yes"
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var
      - cowrie_etc:/cowrie/cowrie-git/etc

volumes:
  postgres_data:
  cowrie_var:
  cowrie_etc:
